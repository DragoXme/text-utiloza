    <script>
      (() => {
        const allowedThemes = ["system", "light", "dark"];
        const isAllowedTheme = (choice) => allowedThemes.includes(choice);
        const isUtilozaHost = location.hostname === "utiloza.top" || location.hostname.endsWith(".utiloza.top");
        const getLocalTheme = () => {
          try {
            const value = localStorage.getItem("utiloza-theme") || "";
            return isAllowedTheme(value) ? value : "";
          } catch {
            return "";
          }
        };
        const setLocalTheme = (choice) => {
          try {
            localStorage.setItem("utiloza-theme", choice);
          } catch {
          }
        };
        const setThemeCookie = (choice) => {
          try {
            if (isUtilozaHost) {
              document.cookie = "utiloza-theme=; Max-Age=0; Path=/; SameSite=Lax";
              document.cookie = "utiloza-theme=" + encodeURIComponent(choice) + "; Max-Age=31536000; Path=/; Domain=.utiloza.top; SameSite=Lax";
            } else {
              document.cookie = "utiloza-theme=" + encodeURIComponent(choice) + "; Max-Age=31536000; Path=/; SameSite=Lax";
            }
          } catch {
          }
        };

        try {
          if (isUtilozaHost) {
            document.cookie = "utiloza-theme=; Max-Age=0; Path=/; SameSite=Lax";
          }

          const cookieThemes = document.cookie
            .split(";")
            .map((item) => item.trim())
            .filter((item) => item.startsWith("utiloza-theme="))
            .map((item) => decodeURIComponent(item.slice("utiloza-theme=".length)))
            .filter(isAllowedTheme);
          const cookieTheme = cookieThemes.at(-1) || "";
          const localTheme = getLocalTheme();
          const stored = cookieTheme || localTheme || "system";

          if (isAllowedTheme(cookieTheme)) {
            setLocalTheme(stored);
          } else if (localTheme) {
            setThemeCookie(stored);
          }

          const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const resolved = stored === "dark" || (stored === "system" && systemDark) ? "dark" : "light";
          document.documentElement.dataset.theme = resolved;
          document.documentElement.dataset.themeChoice = stored;
        } catch {
          document.documentElement.dataset.theme = "light";
          document.documentElement.dataset.themeChoice = "system";
        }
      })();
    </script>

          <div class="tool-title-bar">

            <div class="editor-actions">

          </div>

          <div class="recipe-strip" aria-label="Quick clean presets">

            <button class="recipe-chip" type="button" data-preset="spaces">Clean spaces</button>
            <button class="recipe-chip" type="button" data-preset="list">Clean list</button>

          </div>

          <div class="editor-zone">
            <article class="editor-card">
              <div class="editor-head">
                <span class="editor-label">Messy text</span>
                <div class="metric-row" aria-label="Input text stats">
                  <span><strong id="inputWords">0</strong> words</span>
                  <span><strong id="inputLines">0</strong> lines</span>
                </div>
              </div>
              <textarea id="inputText" class="text-box" spellcheck="true" placeholder="Paste messy text here..." aria-label="Messy text input"></textarea>
            </article>

            <article class="editor-card result-card">
              <div class="editor-head">
                <span class="editor-label">Clean result</span>
                <div class="editor-actions">
                  <button class="icon-button toggle-action" type="button" id="findReplaceToggle" aria-expanded="false" aria-controls="replacePanel">Find</button>
                  <button class="icon-button stable-action" type="button" id="copyButton">Copy</button>
                  <button class="icon-button" type="button" id="downloadButton">Download</button>
                </div>
              </div>
              <div class="replace-panel" id="replacePanel" aria-label="Find and replace in clean result" hidden>
                <div class="replace-row">
                  <label class="field-label" for="findText">Find</label>
                  <input class="clean-input compact-input" id="findText" type="search" autocomplete="off" placeholder="Find text">
                  <div class="match-controls" aria-label="Move between matches">
                    <button class="icon-button compact-button" type="button" id="prevMatchButton">Prev</button>
                    <button class="icon-button compact-button" type="button" id="nextMatchButton">Next</button>
                  </div>
                  <span class="match-counter" id="matchCounter" aria-live="polite">No search</span>
                </div>
                <div class="replace-row">
                  <label class="field-label" for="replaceText">Replace</label>
                  <input class="clean-input compact-input" id="replaceText" type="text" autocomplete="off" placeholder="Replacement">
                  <div class="replace-actions">
                    <button class="icon-button compact-button stable-action" type="button" id="replaceButton">Replace</button>
                    <button class="icon-button compact-button strong-action" type="button" id="replaceAllButton">Replace all</button>
                    <button class="switch-card compact-switch" type="button" role="switch" aria-checked="false" data-setting="matchCase">
                      <span>Match case</span>
                      <i aria-hidden="true"></i>
                    </button>
                  </div>
                </div>
              </div>
              <div id="outputPreview" class="text-box output-preview is-empty" tabindex="0" role="textbox" aria-readonly="true" aria-label="Clean result preview" data-placeholder="Clean text will appear here."></div>
            </article>
          </div>

          <div class="option-dock" aria-label="Text cleaning options">
            <div class="shape-control">
              <span>Output</span>
              <div class="segmented-control" role="radiogroup" aria-label="Text shape">
